services:
  - type: web
    name: axiom-report-api
    runtime: docker
    rootDir: services/property-api
    dockerfilePath: Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: FRONTEND_URL
        value: https://www.axiompropertycasualty.com
      - key: REPORT_SESSION_TTL_SECONDS
        value: "900"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RENTCAST_API_KEY
        sync: false
      - key: ATTOM_API_KEY
        sync: false
      - key: MELISSA_LICENSE_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_APP_PASSWORD
        sync: false
